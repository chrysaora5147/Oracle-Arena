name: Update Prices

on:
  schedule:
    # Weekdays after the regular US market close. 23:30 UTC is intentionally
    # later than both daylight-saving and standard-time closes.
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/update-prices.js
      - run: node scripts/verify-prices.js
      - name: Commit updated prices
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/prices/*.csv
          git diff --cached --quiet || git commit -m "Update price CSV snapshots"
          git push
