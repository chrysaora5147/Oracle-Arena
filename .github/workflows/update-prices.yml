name: Update Prices

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/update-prices.js
      - run: node scripts/verify-prices.js
      - name: Commit updated prices
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/prices/*.csv
          git diff --cached --quiet || git commit -m "Update price CSV snapshots"
          git push
