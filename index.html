<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oracle Arena | 100 สำนักพยากรณ์ตลาด</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="arena-canvas" aria-hidden="true"></canvas>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">OA</span>
          <div>
            <strong>Oracle Arena</strong>
            <small>100 สำนัก 3 ตลาด 1 แชมป์</small>
          </div>
        </div>
        <nav class="nav" aria-label="Primary">
          <button class="nav-item active" data-view="home">Home</button>
          <button class="nav-item" data-view="leaderboard">Leaderboard</button>
          <button class="nav-item" data-view="league">League Page</button>
          <button class="nav-item" data-view="profile">Oracle Profile</button>
          <button class="nav-item" data-view="log">Prediction Log</button>
        </nav>
        <div class="side-card">
          <span class="status-dot"></span>
          <div>
            <strong>Backtest Lab</strong>
            <small>BUY = ถือสินทรัพย์, CASH = ถือเงินสด</small>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Raw Omen → Signal → Backtest → Champion</p>
            <h1 id="page-title">Oracle Arena</h1>
          </div>
          <div class="mode-pill">Forward test ready</div>
        </header>

        <section id="home-view" class="view active"></section>
        <section id="leaderboard-view" class="view"></section>
        <section id="league-view" class="view"></section>
        <section id="profile-view" class="view"></section>
        <section id="log-view" class="view"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
